# DEPRECATED — Alembic has moved to modules/store/alembic.ini
# Use: make migrate  (or: uv run alembic -c modules/store/alembic.ini <cmd>)
# This file is kept for reference only.

# Alembic configuration
# This file is used by alembic CLI and by the store module at startup

[alembic]
script_location = alembic
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s
prepend_sys_path = .
timezone = UTC

# Database URL is loaded from the application settings
# Do not hardcode credentials here
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# Format new migration files with ruff
hooks = ruff
ruff.type = exec
ruff.entrypoint = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
