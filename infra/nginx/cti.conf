# ─────────────────────────────────────────────────────────────
# Nginx — CTI Aggregator
# ─────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    # Health check
    location /health {
        return 200 'ok\n';
        add_header Content-Type text/plain;
        access_log off;
    }

    # API proxy — strips /api prefix
    location /api/ {
        proxy_pass         http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Auth (frontend calls /auth/login directly)
    location /auth/ {
        proxy_pass         http://api:8000/auth/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # Settings
    location /settings/ {
        proxy_pass         http://api:8000/settings/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    location / {
        return 200 'CTI Aggregator — API at /api/\n';
        add_header Content-Type text/plain;
    }
}