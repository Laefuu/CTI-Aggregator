# ─────────────────────────────────────────────────────────────
# Nginx — CTI Aggregator reverse proxy
# ─────────────────────────────────────────────────────────────

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    # ── TLS ──────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/certs/cti.crt;
    ssl_certificate_key /etc/nginx/certs/cti.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ──────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;

    # ── File uploads ──────────────────────────────────────────
    client_max_body_size 60M;    # Matches MAX_PDF_SIZE_MB + margin

    # ── API proxy ─────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts — generous for large PDF uploads
        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
    }

    # ── Frontend (React SPA) ──────────────────────────────────
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        # SPA fallback — all non-asset routes go to index.html
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|ico|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Health check (unauthenticated) ────────────────────────
    location /health {
        proxy_pass http://api:8000/health;
        access_log off;
    }
}
