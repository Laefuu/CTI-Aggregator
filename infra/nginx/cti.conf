# ─────────────────────────────────────────────────────────────
# Nginx — CTI Aggregator
# Phase 0/1 dev config: no API, no frontend yet
# Full config (HTTPS + API proxy) added in Phase 2
# ─────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    # Health check endpoint (unauthenticated, used by make ps)
    location /health {
        return 200 'ok\n';
        add_header Content-Type text/plain;
        access_log off;
    }

    # Placeholder until API is deployed in Phase 2
    location / {
        return 503 'CTI Aggregator — API not deployed yet\n';
        add_header Content-Type text/plain;
    }
}