# ─────────────────────────────────────────────────────────────
# Redis 7 — CTI Aggregator configuration
# ─────────────────────────────────────────────────────────────

# ── Persistence ───────────────────────────────────────────────
# AOF: log every write command — survives restarts without data loss
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec          # Flush to disk every second (good perf/durability tradeoff)
no-appendfsync-on-rewrite no

# RDB snapshot as additional safety net
save 3600 1    # If at least 1 key changed in 1 hour → snapshot
save 300 100   # If at least 100 keys changed in 5 minutes → snapshot

# ── Memory ────────────────────────────────────────────────────
maxmemory 4gb

# noeviction: return error if memory is full instead of silently evicting data
# This is critical — we must never lose pipeline messages
maxmemory-policy noeviction

# ── Security ──────────────────────────────────────────────────
# Password is passed via CLI flag --requirepass in docker-compose
# Do not set it here to avoid hardcoding in config file

# Disable dangerous commands
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""
rename-command CONFIG "CONFIG_ADMIN_ONLY"

# ── Streams ───────────────────────────────────────────────────
# Maximum length for each stream — prevents unbounded growth if a consumer is down
# Streams: cti:raw, cti:chunks, cti:stix_raw, cti:stix_valid, cti:stix_final
# At ~1KB per message and 20 sources, 10k messages ≈ 10MB per stream
# Consumer groups replay from "0" on restart, so this is a safety cap only
# stream-node-max-entries 10000   # Not setting globally; enforce per-stream in code if needed

# ── Logging ───────────────────────────────────────────────────
loglevel notice

# ── Networking ────────────────────────────────────────────────
tcp-keepalive 300
timeout 0
